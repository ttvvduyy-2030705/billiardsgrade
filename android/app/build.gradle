apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"

react {
  autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
  namespace "com.aplus.score"
  buildToolsVersion rootProject.ext.buildToolsVersion
  compileSdkVersion rootProject.ext.compileSdkVersion
  ndkVersion "25.2.9519653"

  packagingOptions {
    pickFirst "lib/arm64-v8a/libreact_nativemodule_core.so"
    pickFirst "lib/armeabi-v7a/libreact_nativemodule_core.so"
    pickFirst "lib/x86/libreact_nativemodule_core.so"
    pickFirst "lib/x86_64/libreact_nativemodule_core.so"
  }

  buildFeatures {
    buildConfig true
  }

  defaultConfig {
    applicationId "com.aplus.score"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode 1
    versionName "1.0.0"
    missingDimensionStrategy 'react-native-camera', 'general'
  }

  signingConfigs {
    debug {
      storeFile file('debug.keystore')
      storePassword 'android'
      keyAlias 'androiddebugkey'
      keyPassword 'android'
    }
    release {
      storeFile file('./billiards.keystore')
      storePassword '24082024'
      keyAlias 'billiards'
      keyPassword '24082024'
    }
  }

  buildTypes {
    debug {
      signingConfig signingConfigs.debug
    }
    release {
      signingConfig signingConfigs.release
      minifyEnabled enableProguardInReleaseBuilds
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
      firebaseCrashlytics {
        nativeSymbolUploadEnabled true
      }
    }
  }
}

dependencies {
  implementation 'com.herohan:UVCAndroid:1.0.11'
  implementation 'com.github.pedroSG94.RootEncoder:rtplibrary:2.2.6'
  implementation("com.facebook.react:react-android")
  implementation "org.nanohttpd:nanohttpd:2.3.1"

  if (project.hasProperty("hermesEnabled") && hermesEnabled.toBoolean()) {
    implementation("com.facebook.react:hermes-android")
  } else {
    implementation jscFlavor
  }
}